<!doctype html>
<html lang="en" class="dark">
<head>
  <link rel="icon" type="image/jpg" href="Images/Rouge_Death_dp.jpg">
  <title>Writeups</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="css/styles.css" rel="stylesheet">
  <link href="css/toggleButton.css" rel="stylesheet">
  <script src="scripts/theme.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-green-lime p-8">
    <div class="container mx-auto py-7">
        <div class="text-center pb-4 text-xl">
            <p class="text-4xl" id="typewriter">CTF Writeups</p><br>
            <a class="text-blue-600 dark:text-red-600" href="index.html">home</a> . <a href="writeups.html"><u>writeups</u></a>
        </div>

        <div class="flex justify-center">
            <div class="px-1 pt-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </div>
            <div>
                <button class="light-mode-button" onclick="toggle_dark_mode()">
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="px-1 pt-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Main Content start -->
    <div class="container max-w-screen-lg mx-auto bg-blue-100 dark:bg-gray-800 rounded-lg shadow-lg">
        <table class="table-auto sm:text-xl">
            <thead>
                <tr class="text-purple-deep dark:text-emerald-400">
                    <th class="sm:w-32 text-left p-2 sm:p-4">#</th>
                    <th class="p-2 sm:p-4 sm:w-1/3">Name</th>
                    <th class="p-2 sm:p-4 sm:w-1/3">Level</th>
                    <th class="p-2 sm:p-4 sm:w-1/3">Platform</th>
                </tr>
            </thead>
            <tbody class="dark:text-gray-200">
                <tr class="sm:text-center">
                    <th class="sm:w-32 text-left p-2 sm:p-4">1</th>
                    <td class="p-2 sm:p-4 sm:w-1/3"><a class="text-indigo-600 dark:text-green-lime" href="writeups/startup.html"><u>Startup</u></a></td>
                    <td class="p-2 sm:p-4 sm:w-1/3">Easy</td>
                    <td class="p-2 sm:p-4 sm:w-1/3">TryHackMe</td>
                </tr>
                <tr class="sm:text-center">
                    <th class="sm:w-32 text-left p-2 sm:p-4">2</th>
                    <td class="p-2 sm:p-4 sm:w-1/3"><a class="text-indigo-600 dark:text-green-lime" href="writeups/colddbox.html"><u>ColddBox</u></a></td>
                    <td class="p-2 sm:p-4 sm:w-1/3">Easy</td>
                    <td class="p-2 sm:p-4 sm:w-1/3">TryHackMe</td>
                </tr>
            </tbody>
        </table>
    </div>
    <!-- Main Content end -->

    <script src="scripts/typewriter.js"></script>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('light');
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
        }
        window.addEventListener("storage", function () {
            if (localStorage.theme == "dark") {
                document.documentElement.classList.remove('light');
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            }
        }, false);
    </script>
</body>
</html>
